<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:title" content="Happy Anniversary Mama Ji & Mami Ji! ❤️">
    <meta property="og:description" content="Aap dono ki jodi hamesha salamat rahe. Ek chota sa surprise aapke liye!">
    <meta property="og:image" content="https://tera-link.com/preview-image.jpg"> 
    <meta property="og:url" content="https://tera-link.com">
    <meta property="og:type" content="website">

    <title>Anniversary Surprise | Mama & Mami Ji</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio id="anniversaryMusic" loop>
        <source src="anniversary_song.mp3" type="audio/mpeg">
    </audio>

    <div class="main-wrapper">
        <div id="musicControl" class="music-icon">🎵</div>

        <section class="hero">
            <div class="hero-content">
                <h1 class="title">Happy Anniversary</h1>
                <p class="couple-names">Mama Ji & Mami Ji</p>
                <div class="scrolldown">👇 Niche scroll karein</div>
            </div>
        </section>

        <section class="surprise-section">
            <h2 class="section-title">Aapke Liye Ek Surprise!</h2>
            <div id="giftBox" class="gift-box">
                <div class="box-lid"></div>
                <div class="box-body">🎁 Tap to Open</div>
            </div>

            <div id="surpriseContent" class="hidden">
                <div class="card-glass">
                    <img src="main-photo.jpg" class="main-img" alt="Mama Mami Main Photo">
                    <h3 class="message-text">Salgirah Mubarak Ho! ✨</h3>
                    <p>Bhagwan aapki jodi hamesha banaye rakhe.</p>
                </div>
            </div>
        </section>

        <section class="gallery-section">
            <h2 class="section-title">Hamari Yaadein</h2>
            <div class="gallery">
                <div class="photo-item"><img src="p1.jpg" alt="Memory 1"></div>
                <div class="photo-item"><img src="p2.jpg" alt="Memory 2"></div>
                <div class="photo-item"><img src="p3.jpg" alt="Memory 3"></div>
            </div>
        </section>

        <footer class="footer">
            <div class="share-btn-container">
                <a href="whatsapp://send?text=Mama aur Mami ji ki anniversary ka surprise dekho: https://tera-link.com" class="whatsapp-share">
                    📱 Share with Family
                </a>
            </div>
            <p class="credit">Made with ❤️ by Shikhar</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
